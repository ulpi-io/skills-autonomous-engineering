name: adversarial-verify
description: "Use when you're about to act on something an agent claimed but did not prove — before fixing a reported bug, committing a refactor, trusting a \"no vulnerabilities\" / \"safe to merge\" verdict, or accepting a benchmark \"win\" — and getting it wrong would be expensive or hard to reverse. Triggers on unverified findings, \"should be fine\", \"looks clean\", a single-source assertion about to drive a mutation."
delegate: adversarial-verify
display_name: Adversarial Verify
short_description: Refute-first panel that gates a claim before you act on it.
default_prompt: Use the $adversarial-verify skill to gate this claim before acting on it — run refute-first skeptics and keep it only if a majority fails to refute.
allow_implicit_invocation: true
