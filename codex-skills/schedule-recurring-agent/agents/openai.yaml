name: schedule-recurring-agent
description: "Use when standing work should run repeatedly on a cadence with no human kicking it off each time — recurring triage, monitoring, audits, or digests on a daily/weekly/hourly schedule. Triggers on \"every morning\", \"check X weekly\", \"run this on a schedule\", \"set up a recurring agent / routine / cron\". Not for a one-off wait within the current run."
delegate: schedule-recurring-agent
display_name: Schedule Recurring Agent
short_description: Recurring scheduled-agent brief with idempotency, bounds, and an off-switch.
default_prompt: Invoke the $schedule-recurring-agent skill to design a bounded, idempotent recurring-agent brief and produce a ready-to-register schedule spec.
allow_implicit_invocation: false
