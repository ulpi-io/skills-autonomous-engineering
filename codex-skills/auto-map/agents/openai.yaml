name: auto-map
description: "Use when a repo has no context map the agent can trust (a real CLAUDE.md / AGENTS.md), after architecture-level changes (new packages, moved modules, changed build/test commands), or to audit an existing map for drift. Triggers on onboarding a codebase, \"set up project memory\", stale docs, the agent not knowing the layout."
delegate: auto-map
display_name: Auto Map
short_description: Verified, disclosure-tiered project context map (Codex AGENTS.md tree).
default_prompt: Invoke the $auto-map skill to build or refresh the project's verified, disclosure-tiered context map.
allow_implicit_invocation: false
