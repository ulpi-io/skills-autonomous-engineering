name: checkpoint-resume
description: "Use when a long, multi-unit task could be interrupted and is worth resuming without redoing finished work — DAG builds, migrations, broad audits, long converge-loops, fan-outs. Triggers on \"make this resumable\", \"pick up where it stopped\", crash or stop recovery, work with many independently-completable units. Not for single-shot tasks."
delegate: checkpoint-resume
display_name: Checkpoint Resume
short_description: Durable, resumable checkpoint for long multi-unit runs.
default_prompt: Use the $checkpoint-resume skill to create or resume a durable .ulpi/runs checkpoint for this multi-unit run, skipping already-done units.
allow_implicit_invocation: true
