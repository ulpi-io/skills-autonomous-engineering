name: auto-ship
description: "Use when a change is already built, tested, and reviewed and you want it taken to shippable — release gates run, changelog/version/docs prepared, PR opened or a rollout staged. Triggers on \"ship it\", \"cut a release\", \"open the PR\", \"prepare the deploy\". Explicit-user-only; never deploys anything irreversible without human sign-off."
delegate: auto-ship
display_name: Auto Ship
short_description: Fail-closed pre-launch gate and release prep, with human sign-off on anything irreversible.
default_prompt: Invoke the $auto-ship skill to run the fail-closed pre-launch gate on the current branch, prepare the release (atomic commits, grounded changelog, version bump, docs) and open the PR, halting for explicit human approval before any irreversible deploy.
allow_implicit_invocation: false
