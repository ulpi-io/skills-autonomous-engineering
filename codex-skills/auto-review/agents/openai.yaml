name: auto-review
description: "Use when a change is about to be merged, or you want to audit a module, branch, or PR, and you want a multi-axis review (correctness, security, performance, maintainability, tests, API/compat) whose findings are verified real rather than a raw model dump full of false positives. Triggers on \"review this\", a pre-merge check, \"is this safe to merge\", a diff/branch/PR audit."
delegate: auto-review
display_name: Auto Review
short_description: Verified multi-axis code review that keeps only findings surviving an adversarial check.
default_prompt: Invoke the $auto-review skill to review the current branch diff across all dimensions, keep only adversarially-verified findings, and report them severity-labeled with file:line and a suggested fix.
allow_implicit_invocation: false
