name: watch-and-act
description: "Use when you must wait on EXTERNAL state that changes on its own timeline and the harness won't wake you for — CI or build status, a deploy, a remote queue draining, a URL becoming healthy, an approval landing — then act on the transition. Triggers on \"wait for CI\", \"watch the deploy\", \"poll until it's ready/green\". Not for harness-tracked background work (it re-invokes you automatically), and not for a one-time inline check."
delegate: watch-and-act
display_name: Watch And Act
short_description: Bounded, cache-aware polling of an external signal.
default_prompt: Use the $watch-and-act skill to watch this external signal on a cache-aware cadence bounded by a deadline, persisting durable watch state and acting on the transition.
allow_implicit_invocation: true
