name: converge-loop
description: "Use whenever the task is \"repeat an action until a measurable condition holds\" — fix until tests or typecheck pass, clean until a linter is quiet, harden until an audit is dry, add tests until coverage is met — and you want it to STOP honestly rather than spin. Triggers on \"keep going until it's green\", \"loop until done\", until-green / until-dry work. Not for one-shot tasks or unmeasurable goals."
delegate: converge-loop
display_name: Converge Loop
short_description: Bounded until-green/until-dry loop that converges and stops honestly.
default_prompt: Use the $converge-loop skill to drive this work to its measurable target and stop the instant it converges, exhausts its cap/budget, or stalls.
allow_implicit_invocation: false
