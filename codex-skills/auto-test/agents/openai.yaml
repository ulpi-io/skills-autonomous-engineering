name: auto-test
description: "Use when you want to prove code works and lock in its behavior with a meaningful suite — after a build, on a risky or untested module, to add a regression test that reproduces a known bug, or to de-flake an unreliable suite. Triggers on \"add tests\", \"raise coverage\", \"cover this\", \"make the tests pass\", flaky/intermittent failures. Not for test-first authoring during new-behavior implementation."
delegate: auto-test
display_name: Auto Test
short_description: Drive to a green, meaningful, mutation-checked suite — fails closed, never gamed green.
default_prompt: Invoke the $auto-test skill to raise test health on the target — find untested behaviors, write mutation-checked tests, and loop until the suite is genuinely green.
allow_implicit_invocation: false
