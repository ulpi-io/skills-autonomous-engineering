name: auto-simplify
description: "Use when code works but reads worse than it should — duplication, dead code, over-abstraction, a tangled diff or messy module you want clarified WITHOUT changing behavior. Triggers on \"clean this up\", \"simplify\", \"reduce complexity\", \"make it readable\", a post-build tidy. Not for changing behavior, fixing bugs, or optimizing speed."
delegate: auto-simplify
display_name: Auto Simplify
short_description: Reduce complexity without changing behavior — prove each edit preserving, or revert.
default_prompt: Invoke the $auto-simplify skill to reduce complexity in the current diff without changing behavior — smallest edit, prove behavior preserved or revert, loop until dry.
allow_implicit_invocation: false
