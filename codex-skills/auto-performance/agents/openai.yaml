name: auto-performance
description: "Use when there is a performance requirement, a latency/throughput target, or a suspected regression and you want to optimize the RIGHT thing, proven by measurement. Triggers on \"make it faster\", a slow endpoint/page/query, a perf budget, \"is this a regression\", profiling. Not for a guessed \"should be faster\" with no benchmark."
delegate: auto-performance
display_name: Auto Performance
short_description: Measurement-first optimization that accepts a change only when a benchmark proves it faster.
default_prompt: Invoke the $auto-performance skill to establish a metric and reproducible baseline, profile to the real hotspots, and apply benchmark-gated optimizations that are kept only when proven faster beyond variance with correctness intact.
allow_implicit_invocation: false
