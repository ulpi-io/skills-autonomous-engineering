name: auto-learn
description: "Use when an autonomous run has just finished, or a session hit blocks, thrash, wrong turns, or surprises worth not repeating, and you want the lessons captured so the next session starts smarter. Triggers on run wrap-up, \"what did we learn\", a recurring mistake, the post-mortem of a pipeline run."
delegate: auto-learn
display_name: Auto Learn
short_description: Verified, deduped learnings harvested from a run into durable memory.
default_prompt: Invoke the $auto-learn skill to harvest, verify, and record durable learnings from the latest autonomous run.
allow_implicit_invocation: false
