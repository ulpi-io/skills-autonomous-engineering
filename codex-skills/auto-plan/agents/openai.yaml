name: auto-plan
description: "Use when a spec exists (from auto-spec or supplied) and needs to become an implementable, ordered task breakdown before any code is written. Triggers on \"plan this out\", \"break the spec into tasks\", \"what's the build order\", turning requirements into a buildable DAG. Not for defining WHAT to build, and not from a vague, untestable spec."
delegate: auto-plan
display_name: Auto Plan
short_description: Spec to a self-reviewed, structurally gated DAG of atomic build tasks.
default_prompt: Invoke the $auto-plan skill to decompose this spec into a self-reviewed, layered DAG of atomic build tasks in .ulpi/plans/.
allow_implicit_invocation: false
