name: autonomous-pipeline
description: "Use when the user wants a whole request taken from idea to shipped in one autonomous run — spec, plan, build, simplify, test, review, performance, ship — rather than invoking each phase by hand. Triggers on \"take this end to end\", \"build and ship this\", \"run the whole pipeline\", \"do the whole thing autonomously\". Explicit-user-only; spawns many agents over many rounds."
delegate: autonomous-pipeline
display_name: Autonomous Pipeline
short_description: One request to shipped-quality work in one governed, fail-closed autonomous pass.
default_prompt: Invoke the $autonomous-pipeline skill to take this request from idea to shipped in one governed pass with a single plan approval.
allow_implicit_invocation: false
