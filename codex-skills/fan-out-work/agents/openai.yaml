name: fan-out-work
description: "Use when you have (or can cheaply discover) a list of INDEPENDENT items that each need the same multi-step treatment and doing them serially wastes wall-clock — audit every module, migrate every call site, test every gap, review every changed file. Triggers on \"do this to all of them\", a broad sweep, a per-file pass over a big N. Not for a handful of items or cross-item-dependent work."
delegate: fan-out-work
display_name: Fan Out Work
short_description: Parallel map over N independent items, honestly accounted.
default_prompt: Use the $fan-out-work skill to run the same treatment across every independent item in this work-list in parallel, isolating writers and reporting covered, failed, and dropped items.
allow_implicit_invocation: false
