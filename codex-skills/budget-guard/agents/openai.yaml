name: budget-guard
description: "Use when about to start ANY unattended run — a loop, a fan-out, an auto-phase, the full pipeline — that will spawn many agents or execute many rounds with no human in between, to set and enforce the stop conditions that keep it from running away. Triggers on \"run this unattended\", \"don't let it spin\", long autonomous work, anything looping toward a target."
delegate: budget-guard
display_name: Budget Guard
short_description: Declare-and-enforce the five stop conditions for any unattended run.
default_prompt: Use the $budget-guard skill to declare and enforce the five stop conditions before this unattended run starts, and stop the instant one fires.
allow_implicit_invocation: true
