name: validate

on:
  push:
    branches: [main]
  pull_request:

# Deterministic, hermetic CI: NO Codex login, NO external network, NO user-global config, and NO
# writable path outside the checkout / $RUNNER_TEMP. The Codex smoke runs in its DEFAULT fake mode
# (never --live). Every suite is its own visible, named, fail-fast step: a red gate fails the job
# (no continue-on-error, no shell masking) and GitHub stops before any later step can mask it.
jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      # --- Cross-surface skill/manifest/hook validation ---
      - name: Validate skills (both surfaces, hooks) — frontmatter, routing budget, refs, scripts, manifests, self-containment
        run: node scripts/validate-skills.mjs --surface all --hooks

      # --- Shell suites (guards + gate contracts) ---
      - name: Guard scripts behave (block/allow/escape-hatch contract)
        run: bash scripts/test-guards.sh
      - name: Checkpoint store contract (lifecycle + fail-closed refusals + timestamps + launch)
        run: bash scripts/test-checkpoint.sh
      - name: Run-status reader contract (read-only render/list/json/resume)
        run: bash scripts/test-run-status.sh
      - name: Map verifier contract (anti-lie gate catches every class of lying map)
        run: bash scripts/test-map-verify.sh
      - name: Plan DAG gate contract (structural judge catches every class of unsafe plan)
        run: bash scripts/test-plan-validate.sh
      - name: Harvest contract (auto-learn extracts every learning-signal class with evidence)
        run: bash scripts/test-harvest.sh
      - name: Validate-skills behavior contract (dual-surface flags + doc-honesty guard)
        run: bash scripts/test-validate-skills.sh
      - name: Watch-state contract (durable cross-turn watch bounds + fail-closed refusals)
        run: bash scripts/test-watch-state.sh
      - name: Scheduled-job gate contract (schema, dedup-first, capability, teardown)
        run: bash scripts/test-scheduled-job.sh

      # --- Node unit / E2E suites (node:test, mock/fake runtimes — no live agents, no network) ---
      - name: Workflow journal reader (captured format + fail-safe live overlay)
        run: node --test scripts/test-workflow-journal.mjs
      - name: Opt-in event log (fsynced append + atomic snapshot + crash/torn-tail recovery)
        run: node --test scripts/test-event-log.mjs
      - name: Intake scope authority (canonical schema + atomic write-once fidelity gate)
        run: node --test scripts/test-intake-scope.mjs
      - name: Intake capture CLI (grammar + paths + JSON errors + pinned exit codes)
        run: node --test scripts/test-capture-intake.mjs
      - name: Pipeline state machine (legal/illegal transitions + convergence conjunction)
        run: node --test scripts/test-pipeline-state.mjs
      - name: CLI contract (argv/flag parsing + fail-closed refusals)
        run: node --test scripts/test-cli-contract.mjs
      - name: Git workspaces (worktree isolation lifecycle)
        run: node --test scripts/test-git-workspaces.mjs
      - name: Git integration (merge/integration safety)
        run: node --test scripts/test-git-integration.mjs
      - name: Codex executor (buildCodexArgv + schema-output gate + process runner)
        run: node --test scripts/test-codex-executor.mjs
      - name: Budget ledger (token/iteration accounting + fail-closed caps)
        run: node --test scripts/test-budget-ledger.mjs
      - name: Authorization (permission/authority boundaries)
        run: node --test scripts/test-authorization.mjs
      - name: Review panel (adversarial verify + majority-refute)
        run: node --test scripts/test-review-panel.mjs
      - name: Build engine (slice-scoped build DAG)
        run: node --test scripts/test-build-engine.mjs
      - name: Phase engine (fail-closed phase gates)
        run: node --test scripts/test-phase-engine.mjs
      - name: Pipeline CLI (coordinator command surface)
        run: node --test scripts/test-pipeline-cli.mjs
      - name: Pipeline E2E (zero-network real coordinator over temp repos + fake codex)
        run: node --test scripts/test-pipeline-e2e.mjs
      - name: Pipeline security (isolation + redaction + fail-closed under adversarial input)
        run: node --test scripts/test-pipeline-security.mjs
      - name: CI workflow contract (every suite is a named, unmaskable, hermetic gate)
        run: node --test scripts/test-ci-workflow.mjs

      # --- Legacy compatibility suite ---
      - name: Pipeline workflow transitions (legacy fail-closed gates under a mock runtime — no live agents)
        run: node scripts/test-pipeline-workflow.mjs

      # --- Static site (owned by the site slice — do not remove) ---
      - name: Static site routes, links, metadata, analytics, and generated-output drift
        run: node --test scripts/test-site.mjs
