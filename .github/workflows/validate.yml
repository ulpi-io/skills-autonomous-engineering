name: validate

on:
  push:
    branches: [main]
  pull_request:

jobs:
  validate-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Validate skills (frontmatter, routing budget, refs, scripts, hooks, manifests, self-containment)
        run: node scripts/validate-skills.mjs
      - name: Guard scripts behave (block/allow/escape-hatch contract)
        run: bash scripts/test-guards.sh
      - name: Checkpoint CLI contract (lifecycle + fail-closed refusals + timestamps + launch)
        run: bash scripts/test-checkpoint.sh
      - name: Run-status reader contract (read-only render/list/json/resume)
        run: bash scripts/test-run-status.sh
      - name: Map verifier contract (anti-lie gate catches every class of lying map)
        run: bash scripts/test-map-verify.sh
      - name: Plan DAG gate contract (structural judge catches every class of unsafe plan)
        run: bash scripts/test-plan-validate.sh
      - name: Harvest contract (auto-learn extracts every learning-signal class with evidence)
        run: bash scripts/test-harvest.sh
      - name: Pipeline workflow transitions (fail-closed gates under a mock runtime — no live agents)
        run: node scripts/test-pipeline-workflow.mjs
      - name: Static site routes, links, metadata, analytics, and generated-output drift
        run: node --test scripts/test-site.mjs
